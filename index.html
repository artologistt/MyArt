<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Arts Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- باکگراوندی ڕەنگاوڕەنگی جوڵاو (لە کۆدەکەی خۆتەوە وەرگیراوە) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            color: #1a1a1a;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- دیزاینی شووشەیی (Glassmorphism) --- */
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        .glass-image {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.1);
        }

        /* --- ڕووکاری پێشەکی --- */
        #intro-section {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1.5s ease, visibility 1.5s ease;
        }

        /* --- دوگمەی My Arts --- */
        #start-btn {
            width: 280px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        #start-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(126, 34, 206, 0.2); /* سێبەری مۆر */
        }

        /* ئەنیمەیشنی فۆنتەکان بە نەرمی */
        .btn-text {
            font-size: 2rem;
            color: #4c1d95; /* مۆری تۆخ */
            font-weight: bold;
            animation: fontSmoothSwap 8s infinite;
        }

        @keyframes fontSmoothSwap {
            0%, 20%   { font-family: 'Segoe UI', Tahoma, sans-serif; }
            25%, 45%  { font-family: 'Georgia', serif; }
            50%, 70%  { font-family: 'Courier New', Courier, monospace; }
            75%, 95%  { font-family: 'Times New Roman', Times, serif; }
            100%      { font-family: 'Segoe UI', Tahoma, sans-serif; }
        }

        /* --- بەشی وێنەکان --- */
        #gallery-section {
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .art-row {
            opacity: 0;
            transform: translateY(60px);
            transition: all 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .art-row.show {
            opacity: 1;
            transform: translateY(0);
        }

        .art-image-img {
            transition: transform 0.5s ease;
        }
        
        .glass-image:hover .art-image-img {
            transform: scale(1.02);
        }

        /* ستایلی فەید بوونی وشەکان */
        .word {
            opacity: 0;
            transition: opacity 0.5s ease;
            display: inline-block;
            margin-right: 4px;
        }
    </style>
</head>
<body class="antialiased">

    <audio id="bg-music" loop>
        <source src="Cigarettes After Sex - Apocalypse (looped intro)(MP3_320K).mp3" type="audio/mpeg">
    </audio>

    <div id="intro-section" class="px-6">
        <button id="start-btn" class="glass rounded-full text-center group">
            <span class="btn-text group-hover:text-purple-900 transition-colors">My Arts</span>
        </button>
    </div>

    <main id="gallery-section" class="max-w-7xl mx-auto px-6 py-24">
        
        <div class="text-center mb-32 glass p-8 rounded-3xl max-w-2xl mx-auto">
            <h2 class="text-4xl md:text-5xl mb-4 font-bold text-purple-900" style="font-family: 'Georgia', serif;">The Exhibition</h2>
            <div class="w-24 h-1 bg-purple-600 mx-auto rounded-full"></div>
            <p class="mt-6 text-gray-700 text-lg">Scroll down to explore the stories behind the canvas.</p>
        </div>

        <div id="art-container" class="flex flex-col gap-y-[20vh]">
            </div>

        <footer class="mt-32 border-t border-white/50 py-8 text-center glass rounded-t-3xl text-gray-700">
            <p class="font-medium">&copy; 2026 My Arts Portfolio. A Journey of Colors and Words.</p>
        </footer>

    </main>

    <script>
        // زانیاری وێنەکان
        const artsData = [
            { img: 'art1.png', text: "A window to a silent soul, captured in the raw honesty of charcoal. This gaze is not merely an observation; it is an invitation into a labyrinth of unspoken thoughts. The darkness of the iris holds a universe of depth, framed by lashes that reach out like delicate shadows. Between the sharp lines and the soft smudges of graphite, there lies a profound stillness—a moment frozen where the eye speaks what the lips dare not utter." },
            { img: 'art2.png', text: "A symphony of gold and violet unfolds across a canvas of fading light. The power lines, etched like musical staves against the amber sky, carry the silhouettes of birds as if they were notes in a melancholic melody. There is a poetic balance in this urban sunset—where the cold geometry of industrial wires meets the fleeting freedom of wings. It captures that transient moment of dusk when the world pauses to breathe, suspended between the warmth of the day and the encroaching mystery of the night." },
            { img: 'art3.png', text: "An impressionistic daydream where the earth reaches up to kiss the heavens. Below, a vibrant tapestry of wildflowers dances in the breeze, scattered like colorful confetti across a sea of emerald green. Above, the sky is heavy with majestic, swirling clouds—great pillows of white and gray that seem to pulse with a life of their own. It is a celebration of nature’s untamed beauty, a moment where the chaos of the brushstrokes creates a perfect harmony of light, color, and infinite possibilities." },
            { img: 'art4.png', text: "The anatomy of a bleeding passion, where the cold precision of ink meets the warmth of a blooming soul. This anatomical heart, intricately detailed with every vein and valve, serves as a vessel not just for life, but for the emotions that consume us. The crimson roses erupting from its core are a testament to the beauty that can grow from vulnerability—a fragile coexistence of thorns and petals. It is a visual metaphor for the human condition: a heart that beats with the weight of its own history, yet finds the strength to flourish in vibrant, defiant color." },
            { img: 'art5.png', text: "A solitary sentinel of light in a world of deepening azure. This vintage streetlamp stands as a beacon of warmth against the cool, rhythmic textures of a winter’s night. The golden halo it casts is not just light, but a sanctuary—a soft glow that carves out a space of safety amidst the swirling shadows and the whispers of falling snow. There is a profound sense of solitude here, yet it isn't lonely; it is the quiet, comforting presence of a guide through the darkness, reminding us that even in the coldest nights, a single spark can hold the shadows at bay." },
            { img: 'art6.png', text: "A celestial dance of emerald and gold, where the heavens spill their starlit secrets over the silent earth. The dark, jagged silhouettes of the pines stand like ancient watchers, their needles pointing toward the infinite mystery of the aurora. In this cosmic tapestry, the vibrant transition from lime-yellow to deep obsidian creates a sense of awe—a reminder that we are but small witnesses to the grand, glowing whispers of the universe. It is a moment of profound cosmic solitude, where the static of the world fades into the shimmering dust of a thousand distant suns." },
            { img: 'art7.png', text: "A skeletal silhouette reaching for the infinite, standing as a lone witness to the cosmic theater above. Under a canopy of indigo and obsidian, the bare branches of the tree act like nerves, sensing the cold vibration of the starlight. The crescent moon and the fleeting streak of a shooting star break the stillness, offering a glimpse of movement in the eternal void. It is a portrait of existential patience—a reminder that even in our barest, most winter-like moments, we are still cradled by the vast and shimmering beauty of the universe." },
            { img: 'art8.png', text: "A breathtaking ocean of indigo and teal spills across the night sky, where the Milky Way breathes in swirls of celestial dust. The constellations emerge like ancient silver anchors in a sea of dreams, guiding the wandering soul through the vastness of the unknown. Below, the dark, jagged edge of the forest stands in solemn reverence, silhouetted against the vibrant cosmic glow. It is a visual poem of interconnectedness—a moment where the boundaries between the earthly and the divine dissolve into a single, shimmering heartbeat of the universe." }
        ];

        const container = document.getElementById('art-container');

        // دروستکردنی کۆدەکان بە شێوازی Tailwind
        artsData.forEach((art, index) => {
            // دیاریکردنی ئاراستە (زیک زاک): جووت و تاک
            const isEven = index % 2 !== 0; 
            const rowDirection = isEven ? 'md:flex-row-reverse' : 'md:flex-row';

            const row = document.createElement('div');
            row.className = `art-row flex flex-col ${rowDirection} items-center gap-12`;

            // بەشی وێنە
            const imgDiv = document.createElement('div');
            imgDiv.className = 'w-full md:w-1/2 glass-image p-4 rounded-3xl overflow-hidden flex justify-center items-center';
            imgDiv.innerHTML = `<img src="${art.img}" alt="Art ${index + 1}" class="art-image-img w-full h-auto rounded-2xl object-cover">`;

            // بەشی نوسین
            const textDiv = document.createElement('div');
            textDiv.className = 'w-full md:w-1/2 glass p-8 md:p-10 rounded-3xl';
            
            // پارچە پارچەکردنی وشەکان
            const words = art.text.split(' ');
            const textHTML = words.map(word => `<span class="word text-gray-800 text-lg md:text-xl leading-relaxed">${word}</span>`).join(' ');
            textDiv.innerHTML = textHTML;

            row.appendChild(imgDiv);
            row.appendChild(textDiv);
            container.appendChild(row);
        });

        // کارپێکردن بە کلیکی دوگمەکە
        document.getElementById('start-btn').addEventListener('click', () => {
            const music = document.getElementById('bg-music');
            music.volume = 0.5;
            music.play();

            const intro = document.getElementById('intro-section');
            const gallery = document.getElementById('gallery-section');

            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                gallery.style.display = 'block';
                setTimeout(() => { gallery.style.opacity = '1'; }, 100);
            }, 1500);
        });

        // چاودێریکردنی سکرۆڵ بۆ دەرخستنی وشەکان لەگەڵ بینینی وێنەکە
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.35 // کاتێک ٣٥٪ی بۆکسەکە دەردەکەوێت
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const words = entry.target.querySelectorAll('.word');
                
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    words.forEach((word, index) => {
                        setTimeout(() => {
                            word.style.opacity = '1';
                        }, index * 40); // خێرایی دەرکەوتنی هەر وشەیەک ٤٠ میللی چرکە
                    });
                } else {
                    // شاردنەوەی وشەکان ئەگەر لە شاشە چوونە دەرەوە بۆ دووبارە دەرکەوتنەوەی جوانیان
                    words.forEach(word => {
                        word.style.opacity = '0';
                    });
                }
            });
        }, observerOptions);

        setTimeout(() => {
            document.querySelectorAll('.art-row').forEach((row) => {
                observer.observe(row);
            });
        }, 100);

    </script>
</body>
</html>
