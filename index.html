<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Arts Portfolio</title>
    <style>
        /* --- ڕێکخستنی سەرەتایی --- */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background-color: #020617; /* ڕەنگی بنچینەیی تاریک */
        }

        /* --- باکگراوندی هەوری جوڵاو (Fluid Cloud Mesh Gradient) --- */
        .bg-clouds {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        .cloud {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.7;
            animation: moveClouds 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* دروستکردنی ڕەنگەکان و شێوەی هەورەکان */
        .cloud1 { background: #4c1d95; width: 60vw; height: 60vh; top: -10%; left: -10%; animation-duration: 25s; }
        .cloud2 { background: #be185d; width: 50vw; height: 50vh; bottom: -20%; right: -10%; animation-duration: 28s; animation-direction: alternate-reverse; }
        .cloud3 { background: #0f766e; width: 45vw; height: 45vh; top: 40%; left: 30%; animation-duration: 22s; }
        .cloud4 { background: #1d4ed8; width: 55vw; height: 55vh; top: 10%; right: 20%; animation-duration: 30s; }

        @keyframes moveClouds {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(15vw, 15vh) scale(1.1); }
            66% { transform: translate(-10vw, 10vh) scale(0.9); }
            100% { transform: translate(10vw, -15vh) scale(1.1); }
        }

        /* --- ڕووکاری پێشەکی (Landing Page) --- */
        #intro-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 2s ease, visibility 2s;
            position: fixed;
            width: 100%;
            z-index: 100;
        }

        .intro-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 80px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* ئەنیمەیشنی خێرا و ئاڵۆزی گۆڕانی فۆنتەکانی دوگمەکە */
        @keyframes crazyFontSwap {
            0%   { font-family: 'Arial', sans-serif; font-weight: normal; font-style: normal; letter-spacing: 2px; text-transform: uppercase; }
            14%  { font-family: 'Courier New', monospace; font-weight: bold; font-style: italic; letter-spacing: 5px; text-transform: lowercase; }
            28%  { font-family: 'Georgia', serif; font-weight: 100; font-style: normal; letter-spacing: -1px; text-transform: capitalize; }
            42%  { font-family: 'Impact', fantasy; font-weight: normal; font-style: italic; letter-spacing: 3px; text-transform: uppercase; }
            57%  { font-family: 'Comic Sans MS', cursive; font-weight: bold; font-style: normal; letter-spacing: 1px; text-transform: lowercase; }
            71%  { font-family: 'Times New Roman', serif; font-weight: 900; font-style: italic; letter-spacing: 6px; text-transform: capitalize; }
            85%  { font-family: 'Verdana', sans-serif; font-weight: normal; font-style: italic; letter-spacing: -2px; text-transform: uppercase; }
            100% { font-family: 'Arial', sans-serif; font-weight: normal; font-style: normal; letter-spacing: 2px; text-transform: uppercase; }
        }

        #start-btn {
            font-size: 2.5rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 50px;
            border-radius: 40px;
            cursor: pointer;
            animation: crazyFontSwap 0.7s infinite; /* خێرایی زۆرتر کرا */
            transition: background 0.3s ease, transform 0.3s ease;
            backdrop-filter: blur(10px);
            min-width: 250px;
        }

        #start-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* --- بەشی وێنەکان (Gallery) --- */
        #gallery-section {
            display: none;
            padding: 100px 0;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* دیزاینی زیک زاک */
        .art-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0 auto 250px auto; /* مەودایەکی زۆر لەنێوان ڕیزەکان بۆ سکرۆڵی زیاتر */
            width: 85%;
            gap: 60px;
            opacity: 0;
            transform: translateY(100px);
            transition: all 1.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .art-row.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ڕیزی تاک: وێنە لای ڕاست، نوسین لای چەپ */
        .art-row:nth-child(odd) {
            flex-direction: row-reverse;
        }

        /* ڕیزی جووت: وێنە لای چەپ، نوسین لای ڕاست */
        .art-row:nth-child(even) {
            flex-direction: row;
        }

        .art-image, .art-text-container {
            flex: 1;
            width: 45%;
        }

        .art-image {
            display: flex;
            justify-content: center;
        }

        .art-image img {
            width: 100%;
            max-width: 600px; /* سایزی مامناوەند بۆ وێنەکان */
            height: auto;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.5s ease;
        }

        .art-image img:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 50px rgba(255, 255, 255, 0.1);
        }

        /* ستایلی گلاسی بۆ نوسینەکان */
        .art-text-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            font-size: 1.2rem;
            line-height: 1.9;
            color: #eee;
            text-align: justify;
        }

        /* وشەکان سەرەتا شاراوەن */
        .word {
            opacity: 0;
            transition: opacity 0.4s ease;
            display: inline-block;
            margin-right: 4px;
        }

        @media (max-width: 900px) {
            .art-row, .art-row:nth-child(odd), .art-row:nth-child(even) {
                flex-direction: column;
                margin-bottom: 150px;
            }
            .art-image, .art-text-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="bg-clouds">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
    </div>

    <audio id="bg-music" loop>
        <source src="Cigarettes After Sex - Apocalypse (looped intro)(MP3_320K).mp3" type="audio/mpeg">
    </audio>

    <div id="intro-section">
        <div class="intro-glass">
            <button id="start-btn">My Arts</button>
        </div>
    </div>

    <div id="gallery-section">
        </div>

    <script>
        const artsData = [
            { img: 'art1.png', text: "A window to a silent soul, captured in the raw honesty of charcoal. This gaze is not merely an observation; it is an invitation into a labyrinth of unspoken thoughts. The darkness of the iris holds a universe of depth, framed by lashes that reach out like delicate shadows. Between the sharp lines and the soft smudges of graphite, there lies a profound stillness—a moment frozen where the eye speaks what the lips dare not utter." },
            { img: 'art2.png', text: "A symphony of gold and violet unfolds across a canvas of fading light. The power lines, etched like musical staves against the amber sky, carry the silhouettes of birds as if they were notes in a melancholic melody. There is a poetic balance in this urban sunset—where the cold geometry of industrial wires meets the fleeting freedom of wings. It captures that transient moment of dusk when the world pauses to breathe, suspended between the warmth of the day and the encroaching mystery of the night." },
            { img: 'art3.png', text: "An impressionistic daydream where the earth reaches up to kiss the heavens. Below, a vibrant tapestry of wildflowers dances in the breeze, scattered like colorful confetti across a sea of emerald green. Above, the sky is heavy with majestic, swirling clouds—great pillows of white and gray that seem to pulse with a life of their own. It is a celebration of nature’s untamed beauty, a moment where the chaos of the brushstrokes creates a perfect harmony of light, color, and infinite possibilities." },
            { img: 'art4.png', text: "The anatomy of a bleeding passion, where the cold precision of ink meets the warmth of a blooming soul. This anatomical heart, intricately detailed with every vein and valve, serves as a vessel not just for life, but for the emotions that consume us. The crimson roses erupting from its core are a testament to the beauty that can grow from vulnerability—a fragile coexistence of thorns and petals. It is a visual metaphor for the human condition: a heart that beats with the weight of its own history, yet finds the strength to flourish in vibrant, defiant color." },
            { img: 'art5.png', text: "A solitary sentinel of light in a world of deepening azure. This vintage streetlamp stands as a beacon of warmth against the cool, rhythmic textures of a winter’s night. The golden halo it casts is not just light, but a sanctuary—a soft glow that carves out a space of safety amidst the swirling shadows and the whispers of falling snow. There is a profound sense of solitude here, yet it isn't lonely; it is the quiet, comforting presence of a guide through the darkness, reminding us that even in the coldest nights, a single spark can hold the shadows at bay." },
            { img: 'art6.png', text: "A celestial dance of emerald and gold, where the heavens spill their starlit secrets over the silent earth. The dark, jagged silhouettes of the pines stand like ancient watchers, their needles pointing toward the infinite mystery of the aurora. In this cosmic tapestry, the vibrant transition from lime-yellow to deep obsidian creates a sense of awe—a reminder that we are but small witnesses to the grand, glowing whispers of the universe. It is a moment of profound cosmic solitude, where the static of the world fades into the shimmering dust of a thousand distant suns." },
            { img: 'art7.png', text: "A skeletal silhouette reaching for the infinite, standing as a lone witness to the cosmic theater above. Under a canopy of indigo and obsidian, the bare branches of the tree act like nerves, sensing the cold vibration of the starlight. The crescent moon and the fleeting streak of a shooting star break the stillness, offering a glimpse of movement in the eternal void. It is a portrait of existential patience—a reminder that even in our barest, most winter-like moments, we are still cradled by the vast and shimmering beauty of the universe." },
            { img: 'art8.png', text: "A breathtaking ocean of indigo and teal spills across the night sky, where the Milky Way breathes in swirls of celestial dust. The constellations emerge like ancient silver anchors in a sea of dreams, guiding the wandering soul through the vastness of the unknown. Below, the dark, jagged edge of the forest stands in solemn reverence, silhouetted against the vibrant cosmic glow. It is a visual poem of interconnectedness—a moment where the boundaries between the earthly and the divine dissolve into a single, shimmering heartbeat of the universe." }
        ];

        const gallerySection = document.getElementById('gallery-section');

        // جیاکردنەوەی وشەکان بە مەبەستی فەید بوون و دروستکردنی دیزاینەکە
        artsData.forEach((art, index) => {
            const row = document.createElement('div');
            row.className = 'art-row';

            const imgDiv = document.createElement('div');
            imgDiv.className = 'art-image';
            imgDiv.innerHTML = `<img src="${art.img}" alt="Art ${index + 1}">`;

            const textDiv = document.createElement('div');
            textDiv.className = 'art-text-container';
            
            // دروستکردنی span بۆ هەر وشەیەک
            const words = art.text.split(' ');
            const textHTML = words.map(word => `<span class="word">${word}</span>`).join(' ');
            textDiv.innerHTML = textHTML;

            row.appendChild(imgDiv);
            row.appendChild(textDiv);
            gallerySection.appendChild(row);
        });

        // کارپێکردنی موزیک و گۆڕینی ڕووکار
        document.getElementById('start-btn').addEventListener('click', () => {
            const music = document.getElementById('bg-music');
            music.volume = 0.5;
            music.play();

            const intro = document.getElementById('intro-section');
            const gallery = document.getElementById('gallery-section');

            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                gallery.style.display = 'block';
                setTimeout(() => { gallery.style.opacity = '1'; }, 100);
            }, 2000);
        });

        // ئۆبزێرڤەر بۆ چاودێریکردنی سکرۆڵ و دەرکەوتنی وشەکان
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.4 // کاتێک 40%ی بۆکسەکە دێتە ناو شاشە، کار دەکات
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const words = entry.target.querySelectorAll('.word');
                
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    // دەرکەوتنی وشەکان یەک لەدوای یەک بێ کلیک
                    words.forEach((word, index) => {
                        setTimeout(() => {
                            word.style.opacity = '1';
                        }, index * 60); // خێرایی دەرکەوتنی وشەکان (60ms)
                    });
                } else {
                    entry.target.classList.remove('show');
                    // شاردنەوەی وشەکان کاتێک لە شاشە دەچنە دەرەوە
                    words.forEach(word => {
                        word.style.opacity = '0';
                    });
                }
            });
        }, observerOptions);

        setTimeout(() => {
            document.querySelectorAll('.art-row').forEach((row) => {
                observer.observe(row);
            });
        }, 100);

    </script>
</body>
</html>
